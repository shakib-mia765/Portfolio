name: Continuous Deployment

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}


jobs:

  build:

    name: Build & Publish Container

    runs-on: ubuntu-latest

    timeout-minutes: 20

    permissions:
      contents: read
      packages: write


    outputs:
      image: ${{ steps.meta.outputs.tags }}


    steps:

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}


      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max



  deploy:

    name: Deploy Production Kubernetes

    needs:
      - build

    runs-on: ubuntu-latest

    timeout-minutes: 15

    environment:
      name: production


    permissions:
      contents: read


    steps:


      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false


      - name: Configure Kubernetes
        uses: azure/setup-kubectl@v4


      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail

          kubectl apply \
            -k infra/k8s/


      - name: Verify rollout
        shell: bash
        run: |
          set -euo pipefail

          kubectl rollout status \
            deployment/portfolio \
            --timeout=5m


      - name: Deployment summary
        if: success()
        run: |
          {
            echo "## 🚀 Production Deployment Successful"
            echo ""
            echo "- Container build: PASSED"
            echo "- Registry push: PASSED"
            echo "- Kubernetes rollout: PASSED"
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Deployment failure summary
        if: failure()
        run: |
          {
            echo "## ❌ Deployment Failed"
            echo ""
            echo "Check Kubernetes logs and rollout status."
          } >> "$GITHUB_STEP_SUMMARY"
