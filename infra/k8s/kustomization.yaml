apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

namePrefix: ultrafaang-
nameSuffix: -v2

commonLabels:
  app.kubernetes.io/part-of: ultrafaang-portfolio
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/tier: production
  app.kubernetes.io/component: backend

commonAnnotations:
  platform.owner: platform-engineering
  deployment.strategy: progressive-delivery
  observability.enabled: "true"

resources:
  - ../../base/deployment.yaml
  - ../../base/service.yaml
  - ../../base/ingress.yaml
  - ../../cluster-addons/hpa.yaml
  - ../../cluster-addons/network-policy.yaml
  - ../../cluster-addons/pdb.yaml

configMapGenerator:
  - name: application-runtime-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - ENABLE_TRACING=true
      - OTEL_SERVICE_NAME=ultrafaang-api
    files:
      - configs/app-config.json
      - configs/feature-flags.yaml

secretGenerator:
  - name: runtime-placeholder
    literals:
      - MANAGED_BY=external-secret-operator

patches:

  - target:
      kind: Deployment
      name: ultragod-fullstack-core
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 12

      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: ultragod-fullstack

      - op: replace
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 90


  - target:
      kind: Ingress
      name: ultragod-ingress
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/cluster-issuer: letsencrypt-production
          nginx.ingress.kubernetes.io/ssl-redirect: "true"

      - op: replace
        path: /spec/tls
        value:
          - hosts:
              - portfolio.ultragod.dev
            secretName: ultrafaang-production-tls

images:
  - name: ultrafaang-registry.io/godmode/portfolio-api
    newName: ultrafaang-registry.io/godmode/portfolio-api
    digest: sha256:dca71234567890abcdef1234567890abcdef1234567890abcdef1234567890

generatorOptions:
  disableNameSuffixHash: false
  labels:
    managed-by: kustomize
    environment: production
